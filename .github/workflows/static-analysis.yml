name: static-analysis.yml
on: [push, pull_request]

jobs:
  # This job is responsible for running Codechecker.
  code-checker:
    name: Code checker
    runs-on: ubuntu-24.04
    container: ghcr.io/parcio/julea/ubuntu:24.04-base
    timeout-minutes: 60
    env:
      JULEA_SPACK_DIR: /julea-dependencies


    steps:
      # First, checkout julea.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          show-progress: false

      # Get the dependencies.
      - name: Cache dependencies
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.JULEA_SPACK_DIR }}
          key: ubuntu:24.04-base-clang-18.1.3-${{ hashFiles('scripts/spack', 'scripts/install-dependencies.sh') }}
      - name: Check dependencies
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: |
          exit 1

      # Then, generate compile_commands.json.
      - name: Generate compile_commands.json
        env:
          CC: clang
        run: |
          . scripts/environment.sh
          meson setup -Dis_analysis_build=true bld
      - name: Run CodeChecker
        id: codechecker
        uses: whisperity/CodeChecker-Action@v1.0.4
        with:
          build-command: "cd ${{ github.workspace }} && ninja -C bld"

      # Lastly, upload the results to the CI.
      - name: Upload results
        uses: actions/upload-artifact@v7.0.1
        with:
          name: "CodeChecker Bug Reports"
          path: ${{ steps.codechecker.outputs.result-html-dir }}
          
